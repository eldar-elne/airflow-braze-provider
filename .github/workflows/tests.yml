name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches: main

jobs:
  run-tests:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Setup Python (3.11)
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-re2 --only-binary google-re2 || true
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: |
          pytest tests/ -v
